# Nixpacks config for Railway - dual runtime (Node.js + Python)
[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "cd food-ai && rm -rf node_modules && npm ci --omit=dev",
  "python3 -m pip install --no-cache-dir youtube-transcript-api"
]

[phases.build]
cmds = ["echo 'Backend only - no frontend build needed'"]

[start]
cmd = "cd food-ai && node server-clean.mjs"
