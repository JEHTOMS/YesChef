<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      // SPA redirect for GitHub Pages
      // Stores the path and redirects to index.html, which restores it
      var path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem('spa-redirect', path);
      window.location.replace('/');
    </script>
    <noscript>
      This page redirects to the app index. Please enable JavaScript.
    </noscript>
  </body>
</html>
