<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the path into a query param so index.html can restore it before React mounts
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirectUrl = '/?spa-path=' + encodeURIComponent(path + search + hash);
      window.location.replace(redirectUrl);
    </script>
    <noscript>
      This page redirects to the app index. Please enable JavaScript.
    </noscript>
  </body>
</html>
